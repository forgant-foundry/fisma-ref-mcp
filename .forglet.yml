name: fisma-ref-mcp
template: go
module: "github.com/forgant-foundry/fisma-ref-mcp"
require:
  github.com/mark3labs/mcp-go: "v0.54.0"
  github.com/philippgille/chromem-go: "v0.7.0"
  modernc.org/sqlite: "v1.50.1"
  github.com/spf13/cobra: "v1.8.0"
  github.com/yalue/onnxruntime_go: "v1.31.0"
  github.com/daulet/tokenizers: "v1.27.0"
git: true
gitignore:
  - .env

license:
  id: MIT
  author: Forgant

github:
  ci: true
  delivery:
    kind: binary
    builds:
      - tags: embed_nomic
        suffix: nomic
      - tags: embed_qwen3
        suffix: qwen3
      - tags: embed_openai_small
        suffix: openai-small
