# ~~ Generated by forglet. To modify, edit .forglet.yml and run 'forglet synth' ~~
jobs:
    delivery:
        needs:
            - test
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - uses: actions/setup-go@v5
              with:
                go-version-file: go.mod
            - name: Download dependencies
              run: go mod download
            - name: Configure git identity
              run: |-
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git config user.name "github-actions[bot]"
            - name: Install vergant
              run: go install github.com/forgant-foundry/vergant/cmd/vergant@latest
            - id: version
              name: Apply version
              run: echo "tag=$(vergant new)" >> $GITHUB_OUTPUT
            - if: startsWith(steps.version.outputs.tag, 'v')
              name: Build release binaries
              run: |-
                VERSION="${{ steps.version.outputs.tag }}"
                SEM="${VERSION#v}"
                LDFLAGS="-s -w"
                mkdir -p dist

                GOOS=linux  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_linux_amd64.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_amd64.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_arm64.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp.exe .
                cd /tmp && zip "${GITHUB_WORKSPACE}/dist/fisma-ref-mcp_${SEM}_windows_amd64.zip" fisma-ref-mcp.exe && cd -

                GOOS=linux  GOARCH=amd64 go build -tags embed_nomic -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_linux_amd64_nomic.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=amd64 go build -tags embed_nomic -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_amd64_nomic.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=arm64 go build -tags embed_nomic -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_arm64_nomic.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=windows GOARCH=amd64 go build -tags embed_nomic -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp.exe .
                cd /tmp && zip "${GITHUB_WORKSPACE}/dist/fisma-ref-mcp_${SEM}_windows_amd64_nomic.zip" fisma-ref-mcp.exe && cd -

                GOOS=linux  GOARCH=amd64 go build -tags embed_qwen3 -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_linux_amd64_qwen3.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=amd64 go build -tags embed_qwen3 -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_amd64_qwen3.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=arm64 go build -tags embed_qwen3 -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_arm64_qwen3.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=windows GOARCH=amd64 go build -tags embed_qwen3 -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp.exe .
                cd /tmp && zip "${GITHUB_WORKSPACE}/dist/fisma-ref-mcp_${SEM}_windows_amd64_qwen3.zip" fisma-ref-mcp.exe && cd -

                GOOS=linux  GOARCH=amd64 go build -tags embed_openai_small -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_linux_amd64_openai-small.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=amd64 go build -tags embed_openai_small -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_amd64_openai-small.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=darwin GOARCH=arm64 go build -tags embed_openai_small -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp .
                tar czf "dist/fisma-ref-mcp_${SEM}_darwin_arm64_openai-small.tar.gz" -C /tmp fisma-ref-mcp

                GOOS=windows GOARCH=amd64 go build -tags embed_openai_small -ldflags="$LDFLAGS" -o /tmp/fisma-ref-mcp.exe .
                cd /tmp && zip "${GITHUB_WORKSPACE}/dist/fisma-ref-mcp_${SEM}_windows_amd64_openai-small.zip" fisma-ref-mcp.exe && cd -

                cd dist && sha256sum *.tar.gz *.zip > "fisma-ref-mcp_${SEM}_checksums.txt"
            - env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              if: startsWith(steps.version.outputs.tag, 'v')
              name: Create release
              run: |-
                VERSION="${{ steps.version.outputs.tag }}"
                gh release create "$VERSION" --title "${VERSION#v}" --generate-notes dist/*
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                cache: true
                go-version-file: go.mod
            - run: go test ./...
name: delivery
"on":
    push:
        branches:
            - '**'
